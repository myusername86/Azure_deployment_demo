# Step 1: Cosmos DB Only
# This file starts only the Cosmos DB emulator for learning

services:
  cosmosdb:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    container_name: cosmosdb-emulator
    ports:
      - "8081:8081"      # Main API endpoint
      - "10251:10251"    # Internal service
      - "10252:10252"    # Internal service
      - "10253:10253"    # Internal service
      - "10254:10254"    # Internal service
    environment:
      - AZURE_COSMOS_EMULATOR_PARTITION_COUNT=10
      - AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE=true
      - AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE=127.0.0.1
    volumes:
      - cosmosdb-data:/data/db
    mem_limit: 3g
    cpu_count: 2

volumes:
  cosmosdb-data:
    name: cosmosdb-data
