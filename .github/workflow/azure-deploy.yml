name: Deploy React App to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1 - Get code
    - name: Checkout code
      uses: actions/checkout@v3

    # Step 2 - Login to Azure
    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # Step 3 - Login to Container Registry
    - name: Login to Container Registry
      run: |
        az acr login --name uvaraniregistry

    # Step 4 - Build Docker image
    - name: Build Docker image
      run: |
        docker build -t uvaraniregistry.azurecr.io/login-app:latest .

    # Step 5 - Push to Container Registry
    - name: Push Docker image
      run: |
        docker push uvaraniregistry.azurecr.io/login-app:latest

    # Step 6 - Deploy to Azure App Service
    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'uvarani-webapp'
        images: 'uvaraniregistry.azurecr.io/login-app:latest'